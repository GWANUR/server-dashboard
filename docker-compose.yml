services:

  nginx:
    build: ./docker/nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

  frontend:
    build: ./frontend

  backend:
    build: ./backend
    ports:
      - "8000:8000"

  postgres:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dashboard_as
      POSTGRES_USER: dashboard_as
      POSTGRES_PASSWORD: Aleksandr2002AlexStack
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine

volumes:
  postgres_data: